/* ── useWindowWidth ── */
function useWindowWidth() {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    const on = () => setW(window.innerWidth);
    window.addEventListener('resize', on);
    return () => window.removeEventListener('resize', on);
  }, []);
  return w;
}

/* ── Icon ── */
function Icon({ name, size = 20, color, strokeWidth = 1.75, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': strokeWidth }, nameAttr: 'data-lucide' });
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} style={{ display: 'inline-flex', color, lineHeight: 0, flexShrink: 0, ...style }} />;
}

/* ── Badge ── */
function Badge({ children, tone = 'olive', style }) {
  const tones = {
    olive:   { background: 'rgba(107,122,46,0.12)', color: '#6B7A2E' },
    pimento: { background: 'rgba(200,90,42,0.12)',  color: '#C85A2A' },
    cream:   { background: 'rgba(241,234,214,0.18)', color: '#F1EAD6' },
  };
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontFamily: "'Manrope',sans-serif", fontWeight: 700, fontSize: 11, letterSpacing: '0.05em', textTransform: 'uppercase', padding: '4px 9px', borderRadius: 5, whiteSpace: 'nowrap', ...tones[tone], ...style }}>
      {children}
    </span>
  );
}

/* ── Mixed-text renderer ── */
function RT({ parts }) {
  if (typeof parts === 'string') return parts;
  return parts.map((p, i) =>
    typeof p === 'string'
      ? <React.Fragment key={i}>{p}</React.Fragment>
      : <strong key={i} style={{ fontWeight: 700, color: '#1F3A1A' }}>{p.strong}</strong>
  );
}

          </span>
        </li>

}

function Block({ block, mobile }) {
  if (block.type === 'bullets')  return <Bullets items={block.items} />;

  if (block.type === 'services') return <Services items={block.items} />;
  if (block.type === 'callout')  return <DepositCallout />;
  return null;
}

/* ── App ── */
function App() {
  const width = useWindowWidth();
  const mobile = width < 768;
  const showTOC = width >= 960;

  const [open, setOpen] = useState(() => Object.fromEntries(TC_SECTIONS.map(s => [s.id, true])));
  const [active, setActive] = useState(TC_SECTIONS[0].id);
  const [progress, setProgress] = useState(0);

  const toggle = (id) => setOpen(o => ({ ...o, [id]: !o[id] }));
  const allOpen = TC_SECTIONS.every(s => open[s.id]);
  const toggleAll = () => setOpen(Object.fromEntries(TC_SECTIONS.map(s => [s.id, !allOpen])));

  const jump = (id) => {
    const el = document.getElementById(id);
    if (!el) return;
    window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - HEADER_OFFSET - 16, behavior: 'smooth' });
  };

  useEffect(() => {
    const onScroll = () => {
      const probe = window.scrollY + HEADER_OFFSET + 20;
      let cur = TC_SECTIONS[0].id;
      for (const s of TC_SECTIONS) {
        const el = document.getElementById(s.id);
        if (el && el.offsetTop <= probe) cur = s.id;
      }
      setActive(cur);
      const doc = document.documentElement;
      const max = doc.scrollHeight - doc.clientHeight;
      setProgress(max > 0 ? Math.min(1, window.scrollY / max) : 0);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [open]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const px = mobile ? '16px' : '32px';

  return (
    <div>
      <Navbar progress={progress} mobile={mobile} />
      <Hero mobile={mobile} />
      <DepositBanner mobile={mobile} />

      <section style={{ background: '#F1EAD6', padding: mobile ? '32px 0 56px' : '48px 0 72px' }}>
        <div style={{ maxWidth: 1180, margin: '0 auto', padding: `0 ${px}` }}>
          <div style={{ display: 'grid', gridTemplateColumns: showTOC ? '248px 1fr' : '1fr', gap: showTOC ? 36 : 0, alignItems: 'start' }}>
            {showTOC && <TOC active={active} onJump={jump} allOpen={allOpen} onToggleAll={toggleAll} />}
            <div style={{ display: 'flex', flexDirection: 'column', gap: mobile ? 12 : 16, minWidth: 0 }}>
              {TC_SECTIONS.map(s => (
                <SectionCard key={s.id} section={s} open={!!open[s.id]} onToggle={() => toggle(s.id)} mobile={mobile} />
              ))}
              <p style={{ fontFamily: "'Manrope',sans-serif", fontSize: 12.5, lineHeight: 1.6, color: 'rgba(31,58,26,0.45)', margin: '8px 4px 0', textAlign: 'center' }}>
                Effective as of {TC_UPDATED} · {TC_VERSION}. 102 reserves the right to update these terms at any time.
              </p>
            </div>
          </div>
        </div>
      </section>

      <ContactCTA mobile={mobile} />
      <Footer mobile={mobile} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
