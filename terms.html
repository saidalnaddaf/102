const waLink = (msg) => `${WA_BASE}?text=${encodeURIComponent(msg)}`;

const HEADER_OFFSET = 84;

const TC_SECTIONS = [

  {

  {
    id: 'refund', n: '07', icon: 'ban', title: 'Refund Policy',

    blocks: [{ type: 'bullets', items: [

    ]}],
  },
  {
    id: 'responsibilities', n: '08', icon: 'user-check', title: 'Client Responsibilities',
    lead: 'Timely input keeps the project on schedule.',
    blocks: [{ type: 'bullets', items: [
      'The client must provide required content, images, logos, information, approvals, and feedback in a timely manner.',
      'Delays caused by the client may result in project timeline extensions.',
      'If no communication is received for an extended period, the project may be paused until communication resumes.',

    lead: 'Third-party subscriptions and renewals are the client\'s responsibility.',
    blocks: [

      'Ownership of the completed website transfers to the client only after all invoices have been paid in full.',
      'The agency retains all rights to unfinished work until full payment has been received. The agency reserves the right to suspend, pause, or terminate any project if invoices remain unpaid for more than 14 days. Any work completed up to that point remains billable and payable by the client.',

  },
  {
    id: 'acceptance', n: '12', icon: 'check-circle', title: 'Acceptance of Terms',

/* ─── Icon wrapper ─── */
function Icon({ name, size = 24, color, strokeWidth = 1.75, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': strokeWidth }, nameAttr: 'data-lucide' });
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} style={{ display: 'inline-flex', color, lineHeight: 0, flexShrink: 0, ...style }} />;
}

/* ─── Button ─── */
function Button({ children, href, kind = 'primary', icon, style }) {
  const [hover, setHover] = useState(false);
  const base = { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 9, fontFamily: "'Manrope', sans-serif", cursor: 'pointer', textDecoration: 'none', transition: 'all 0.2s ease', whiteSpace: 'nowrap', border: 'none' };
  const kinds = {
    primary: { background: '#C85A2A', color: '#F1EAD6', fontWeight: 600, fontSize: 15, letterSpacing: '0.03em', padding: '14px 28px', borderRadius: 7, boxShadow: '0 4px 14px rgba(200,90,42,0.28)' },
    ghost: { background: 'transparent', color: '#F1EAD6', border: '1.5px solid rgba(241,234,214,0.5)', fontWeight: 500, fontSize: 15, padding: '12px 26px', borderRadius: 7 },
  };
  const hoverStyle = hover ? (kind === 'primary' ? { background: '#b54f23', transform: 'translateY(-1px)' } : { borderColor: '#F1EAD6', background: 'rgba(241,234,214,0.08)' }) : {};
  const props = { style: { ...base, ...kinds[kind], ...hoverStyle, ...style }, onMouseEnter: () => setHover(true), onMouseLeave: () => setHover(false) };
  return <a href={href} target="_blank" rel="noopener" {...props}>{icon && <Icon name={icon} size={18} strokeWidth={2} />}{children}</a>;
}

/* ─── Badge ─── */
function Badge({ children, tone = 'olive', style }) {
  const tones = { olive: { background: 'rgba(107,122,46,0.10)', color: '#6B7A2E' }, pimento: { background: 'rgba(200,90,42,0.10)', color: '#C85A2A' }, cream: { background: 'rgba(241,234,214,0.14)', color: '#F1EAD6' } };
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: "'Manrope', sans-serif", fontWeight: 600, fontSize: 12, letterSpacing: '0.04em', textTransform: 'uppercase', padding: '5px 10px', borderRadius: 5, whiteSpace: 'nowrap', ...tones[tone], ...style }}>{children}</span>;
}

/* ─── Mixed-text renderer ─── */
function RT({ parts }) {
  if (typeof parts === 'string') return parts;
  return parts.map((p, i) => typeof p === 'string' ? <React.Fragment key={i}>{p}</React.Fragment> : <strong key={i} style={{ fontWeight: 700, color: '#1F3A1A' }}>{p.strong}</strong>);
}

/* ─── Block renderers ─── */
function Bullets({ items }) {
  return (
    <ul style={{ listStyle: 'none', margin: 0, padding: 0, display: 'flex', flexDirection: 'column', gap: 13 }}>
      {items.map((it, i) => (
        <li key={i} style={{ display: 'flex', gap: 13, alignItems: 'flex-start' }}>
          <span style={{ flexShrink: 0, marginTop: 9, width: 6, height: 6, borderRadius: '50%', background: ACCENT.solid }} />
          <span style={{ fontFamily: "'Manrope', sans-serif", fontSize: 16, lineHeight: 1.6, color: 'rgba(31,58,26,0.78)' }}><RT parts={it} /></span>
        </li>
      ))}
    </ul>
  );
}

function Steps({ items }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
      {items.map((st, i) => (
        <div key={i} style={{ display: 'flex', gap: 18, position: 'relative', paddingBottom: i < items.length - 1 ? 22 : 0 }}>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', flexShrink: 0 }}>
            <div style={{ width: 38, height: 38, borderRadius: '50%', background: ACCENT.tint, border: `1.5px solid ${ACCENT.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 16, color: ACCENT.solid }}>{i + 1}</div>
            {i < items.length - 1 && <div style={{ flex: 1, width: 2, background: ACCENT.border, marginTop: 4, minHeight: 18 }} />}
          </div>
          <div style={{ paddingTop: 4 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, flexWrap: 'wrap' }}>
              <span style={{ fontFamily: "'Manrope', sans-serif", fontWeight: 600, fontSize: 11.5, letterSpacing: '0.08em', textTransform: 'uppercase', color: ACCENT.solid }}>{st.s}</span>
              <span style={{ fontFamily: "'Fraunces', serif", fontWeight: 500, fontSize: 19, color: '#1F3A1A', letterSpacing: '-0.01em' }}>{st.t}</span>
            </div>
            <p style={{ fontFamily: "'Manrope', sans-serif", fontSize: 15.5, lineHeight: 1.58, color: 'rgba(31,58,26,0.72)', margin: '5px 0 0', maxWidth: 640 }}>{st.d}</p>
          </div>
        </div>
      ))}
    </div>
  );
}

function Services({ items }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 10, marginTop: 4 }}>
      {items.map((s, i) => (
        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 14px', background: '#F1EAD6', borderRadius: 8, border: '1px solid rgba(31,58,26,0.08)' }}>
          <Icon name="dot" size={18} strokeWidth={3} color={ACCENT.solid} />
          <span style={{ fontFamily: "'Manrope', sans-serif", fontSize: 14.5, fontWeight: 500, color: '#1F3A1A' }}>{s}</span>
        </div>
      ))}
    </div>
  );
}

function DepositCallout() {
  return (
    <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start', background: 'rgba(200,90,42,0.07)', border: '1px solid rgba(200,90,42,0.22)', borderRadius: 12, padding: '16px 18px', marginBottom: 4 }}>
      <Icon name="alert-triangle" size={20} strokeWidth={1.9} color="#C85A2A" style={{ marginTop: 1 }} />
      <p style={{ fontFamily: "'Manrope', sans-serif", fontSize: 15.5, lineHeight: 1.55, color: '#1F3A1A', margin: 0, fontWeight: 500 }}>
        This deposit is <strong style={{ fontWeight: 700, color: '#C85A2A' }}>non-refundable</strong> under all circumstances, including project cancellation by the client.
      </p>
    </div>
  );
}

function Block({ block }) {
  if (block.type === 'bullets') return <Bullets items={block.items} />;
  if (block.type === 'steps') return <Steps items={block.items} />;
  if (block.type === 'services') return <Services items={block.items} />;
  if (block.type === 'callout') return <DepositCallout />;
  return null;
}

/* ─── Section card ─── */
function SectionCard({ section, open, onToggle }) {
  const [hover, setHover] = useState(false);
  return (
    <div id={section.id} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ scrollMarginTop: HEADER_OFFSET + 'px', background: '#FFFFFF', borderRadius: 16, border: section.highlight ? '1.5px solid rgba(200,90,42,0.28)' : '1px solid rgba(31,58,26,0.08)', boxShadow: hover ? '0 8px 32px rgba(31,58,26,0.13)' : '0 2px 16px rgba(31,58,26,0.07)', transition: 'all 0.2s ease', overflow: 'hidden' }}>
      <button onClick={onToggle} style={{ width: '100%', display: 'flex', alignItems: 'flex-start', gap: 18, padding: '28px 30px', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit' }}>
        <span style={{ flexShrink: 0, fontFamily: "'Fraunces', serif", fontWeight: 400, fontSize: 30, color: ACCENT.solid, lineHeight: 1, width: 42, letterSpacing: '-0.01em' }}>{section.n}</span>
        <span style={{ flexShrink: 0, width: 42, height: 42, borderRadius: 11, background: ACCENT.tint, display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: -4 }}>
          <Icon name={section.icon} size={22} strokeWidth={1.8} color={ACCENT.solid} />
        </span>
        <span style={{ flex: 1, minWidth: 0 }}>
          <span style={{ display: 'block', fontFamily: "'Fraunces', serif", fontWeight: 500, fontSize: 23, color: '#1F3A1A', letterSpacing: '-0.015em', lineHeight: 1.2 }}>{section.title}</span>
          {section.lead && <span style={{ display: 'block', fontFamily: "'Manrope', sans-serif", fontSize: 15, lineHeight: 1.5, color: 'rgba(31,58,26,0.58)', marginTop: 5 }}>{section.lead}</span>}
        </span>
        <span style={{ flexShrink: 0, width: 34, height: 34, borderRadius: '50%', background: 'rgba(31,58,26,0.05)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 2, transform: open ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.25s ease' }}>
          <Icon name="chevron-down" size={19} strokeWidth={2} color="#1F3A1A" />
        </span>
      </button>
      <div style={{ maxHeight: open ? 2400 : 0, opacity: open ? 1 : 0, transition: 'max-height 0.4s ease, opacity 0.3s ease', overflow: 'hidden' }}>
        <div style={{ padding: '0 30px 30px 102px', display: 'flex', flexDirection: 'column', gap: 18 }}>
          <div style={{ height: 1, background: 'rgba(31,58,26,0.08)', margin: '0 0 4px' }} />
          {section.blocks.map((b, i) => <Block key={i} block={b} />)}
        </div>
      </div>
    </div>
  );
}

/* ─── TOC ─── */
function TOC({ active, onJump, allOpen, onToggleAll }) {
  return (
    <aside style={{ position: 'sticky', top: HEADER_OFFSET, alignSelf: 'start' }}>
      <div style={{ background: '#FFFFFF', borderRadius: 16, border: '1px solid rgba(31,58,26,0.10)', boxShadow: '0 2px 16px rgba(31,58,26,0.06)', padding: '20px 16px', maxHeight: 'calc(100vh - 110px)', display: 'flex', flexDirection: 'column' }}>
        <div style={{ fontFamily: "'Manrope', sans-serif", fontWeight: 600, fontSize: 11.5, letterSpacing: '0.10em', textTransform: 'uppercase', color: 'rgba(31,58,26,0.52)', padding: '0 8px 12px' }}>On this page</div>
        <nav style={{ display: 'flex', flexDirection: 'column', gap: 1, overflowY: 'auto', paddingRight: 2 }}>
          {TC_SECTIONS.map(s => {
            const on = active === s.id;
            return (
              <button key={s.id} onClick={() => onJump(s.id)} style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '9px 10px', borderRadius: 8, background: on ? ACCENT.tint : 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left', transition: 'background 0.15s ease', width: '100%' }}>
                <span style={{ flexShrink: 0, fontFamily: "'Fraunces', serif", fontSize: 14, fontWeight: 500, color: on ? ACCENT.solid : 'rgba(31,58,26,0.40)', width: 20 }}>{s.n}</span>
                <span style={{ fontFamily: "'Manrope', sans-serif", fontSize: 13.5, lineHeight: 1.3, fontWeight: on ? 600 : 500, color: on ? '#1F3A1A' : 'rgba(31,58,26,0.66)' }}>{s.title}</span>
              </button>
            );
          })}
        </nav>
        <button onClick={onToggleAll} style={{ marginTop: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, padding: '10px', borderRadius: 8, border: '1px solid rgba(31,58,26,0.14)', background: 'transparent', cursor: 'pointer', fontFamily: "'Manrope', sans-serif", fontSize: 13, fontWeight: 600, color: '#1F3A1A' }}>
          <Icon name={allOpen ? 'chevrons-down-up' : 'chevrons-up-down'} size={15} strokeWidth={2} color="#1F3A1A" />
          {allOpen ? 'Collapse all' : 'Expand all'}
        </button>
      </div>
    </aside>
  );
}

/* ─── Navbar ─── */
function Navbar({ progress }) {
  return (

          <a href="index.html" style={{ fontFamily: "'Fraunces', serif", fontWeight: 500, fontSize: 26, color: '#F1EAD6', letterSpacing: '-0.03em', textDecoration: 'none' }}>102</a>
          <nav style={{ display: 'flex', gap: 26, marginLeft: 6 }}>
            {[['Home','index.html'],['Courses','courses.html'],['Agency','agency.html']].map(([l,h]) => (
              <a key={l} href={h} style={{ fontFamily: "'Manrope', sans-serif", fontSize: 14.5, fontWeight: 500, color: '#F1EAD6', opacity: 0.78, textDecoration: 'none', padding: '4px 0' }}>{l}</a>
            ))}
          </nav>
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 14 }}>
            <span style={{ fontFamily: "'Manrope', sans-serif", fontSize: 14.5, fontWeight: 500, color: '#F1EAD6', borderBottom: '2px solid #6B7A2E', paddingBottom: 2 }}>Terms</span>
            <Button kind="primary" style={{ padding: '10px 20px', fontSize: 14 }} href={waLink("Hi! I just visited the 102 website and I'd like to get started. Can we discuss?")}>Get started</Button>
          </div>
        </div>
      </header>
      <div style={{ position: 'sticky', top: 68, zIndex: 49, height: 3, background: 'rgba(31,58,26,0.08)' }}>
        <div style={{ height: '100%', width: (progress * 100) + '%', background: ACCENT.solid, transition: 'width 0.1s linear' }} />
      </div>

}

/* ─── Hero ─── */
function Hero() {
  return (
    <section style={{ background: '#1F3A1A', color: '#F1EAD6', padding: '76px 0 84px', position: 'relative', overflow: 'hidden' }}>
      <div aria-hidden="true" style={{ position: 'absolute', right: -120, top: -120, width: 460, height: 460, borderRadius: '50%', background: 'radial-gradient(circle, rgba(107,122,46,0.22), transparent 68%)', pointerEvents: 'none' }} />
      <div style={{ maxWidth: 1180, margin: '0 auto', padding: '0 32px', position: 'relative' }}>
        <Badge tone="cream" style={{ marginBottom: 22 }}><Icon name="scale" size={13} strokeWidth={2} color="#F1EAD6" /> Legal · Client Terms</Badge>
        <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 400, fontSize: 'clamp(44px, 6vw, 68px)', lineHeight: 1.02, letterSpacing: '-0.025em', margin: 0, maxWidth: 760 }}>Terms &amp; Conditions</h1>
        <p style={{ fontSize: 18, lineHeight: 1.6, color: 'rgba(241,234,214,0.78)', maxWidth: 540, marginTop: 22 }}>Please review the following terms before engaging our services.</p>
        <div style={{ display: 'flex', alignItems: 'center', gap: 22, marginTop: 30, flexWrap: 'wrap' }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 14, color: 'rgba(241,234,214,0.62)' }}>
            <Icon name="calendar-clock" size={16} strokeWidth={1.75} color="rgba(241,234,214,0.62)" /> Last updated {TC_UPDATED}
          </span>
          <span style={{ width: 1, height: 16, background: 'rgba(241,234,214,0.22)' }} />
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 14, color: 'rgba(241,234,214,0.62)' }}>
            <Icon name="file-text" size={16} strokeWidth={1.75} color="rgba(241,234,214,0.62)" /> {TC_VERSION} · 12 sections
          </span>
        </div>
      </div>
    </section>

/* ─── Window width hook ─── */
function useWindowWidth() {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    const on = () => setW(window.innerWidth);
    window.addEventListener('resize', on);
    return () => window.removeEventListener('resize', on);
  }, []);
  return w;
}

/* ─── App ─── */
function App() {
  const [open, setOpen] = useState(() => Object.fromEntries(TC_SECTIONS.map(s => [s.id, true])));
  const [active, setActive] = useState(TC_SECTIONS[0].id);
  const [progress, setProgress] = useState(0);
  const width = useWindowWidth();
  const narrow = width < 960;

  const toggle = (id) => setOpen(o => ({ ...o, [id]: !o[id] }));
  const allOpen = TC_SECTIONS.every(s => open[s.id]);
  const toggleAll = () => setOpen(Object.fromEntries(TC_SECTIONS.map(s => [s.id, !allOpen])));

  const jump = (id) => {
    const el = document.getElementById(id);
    if (!el) return;
    window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - HEADER_OFFSET, behavior: 'smooth' });
  };

  useEffect(() => {
    const onScroll = () => {
      const probe = window.scrollY + HEADER_OFFSET + 24;
      let cur = TC_SECTIONS[0].id;
      for (const s of TC_SECTIONS) {
        const el = document.getElementById(s.id);
        if (el && el.offsetTop <= probe) cur = s.id;
      }
      setActive(cur);
      const doc = document.documentElement;
      const max = doc.scrollHeight - doc.clientHeight;
      setProgress(max > 0 ? Math.min(1, window.scrollY / max) : 0);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [open]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <div>
      <Navbar progress={progress} />
      <Hero />
      <DepositBanner />
      <section style={{ background: '#F1EAD6', padding: '52px 0 80px' }}>
        <div style={{ maxWidth: 1180, margin: '0 auto', padding: '0 32px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: narrow ? '1fr' : '264px 1fr', gap: narrow ? 0 : 40, alignItems: 'start' }}>
            {!narrow && <TOC active={active} onJump={jump} allOpen={allOpen} onToggleAll={toggleAll} />}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 18, minWidth: 0 }}>
              {TC_SECTIONS.map(s => <SectionCard key={s.id} section={s} open={!!open[s.id]} onToggle={() => toggle(s.id)} />)}
              <p style={{ fontFamily: "'Manrope', sans-serif", fontSize: 13.5, lineHeight: 1.6, color: 'rgba(31,58,26,0.5)', margin: '12px 4px 0', textAlign: 'center' }}>
                These terms are effective as of {TC_UPDATED} · {TC_VERSION}. 102 reserves the right to update them; the current version always governs new engagements.
              </p>
            </div>
          </div>
        </div>
      </section>
      <ContactCTA />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
